version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: chat_mysql
    environment:
      MYSQL_ROOT_PASSWORD: "123456"
      MYSQL_DATABASE: chat
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: chat_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  chatserver1:
    build: .
    container_name: chat_server1
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "6001:6000"
    volumes:
      - ./config/server_docker.conf:/app/config/server.conf

  chatserver2:
    build: .
    container_name: chat_server2
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "6002:6000"
    volumes:
      - ./config/server_docker.conf:/app/config/server.conf

  nginx:
    image: nginx:alpine
    container_name: chat_nginx
    ports:
      - "8000:8000"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - chatserver1
      - chatserver2

volumes:
  mysql_data:
